<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veles Interiors | Warm Loft Aesthetic</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Warm Loft Palette Setup */
            --bg-base: #DED3C1;
            --bg-secondary: #B0A087;
            --text-primary: #2B2B2B;
            --accent: #FE1110;
            --trust: #0C182A;

            /* UI States & Utilities */
            --bg: var(--bg-base);
            --text: var(--text-primary);
            --sub-text: rgba(43, 43, 43, 0.7);
            --surface: var(--bg-secondary);
            --transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            --header-height: 100px;
        }

        [data-theme="dark"] {
            --bg: #111111;
            --text: #FFFFFF;
            --sub-text: rgba(255, 255, 255, 0.6);
            --surface: #1A1A1A;
        }

        [data-theme="dark"] .logo-icon {
            filter: brightness(0) invert(1) hue-rotate(180deg) saturate(5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: background-color var(--transition), color var(--transition);
            overflow-x: hidden;
            line-height: 1.6;
            position: relative;
        }

        /* Subtle Texture (Clean Studio) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.03;
            z-index: -1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* High-End Architectural Headers */
        h1, h2, h3, h4, .heading-brutalist {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        .heading-sans {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
        }

        /* Custom Cursor */
        #cursor {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: var(--accent);
            border-radius: 0;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, background-color 0.3s;
            display: none;
        }

        @media (pointer: fine) {
            * { cursor: none; }
            #cursor { display: block; }
        }

        #cursor.hover {
            width: 50px;
            height: 50px;
            background-color: rgba(254, 17, 16, 0.1);
            border: 1px solid var(--accent);
            border-radius: 0;
        }

        /* Navigation */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: var(--header-height);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            z-index: 1000;
            background: transparent;
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            height: 32px;
            width: auto;
        }

        .logo-text {
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            color: var(--text);
            text-transform: uppercase;
        }

        .logo-text b {
            font-weight: 900;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--text);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            cursor: none;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.6;
        }

        .hamburger {
            width: 25px;
            height: 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: none;
            border: none;
            cursor: none;
        }

        .hamburger span {
            width: 100%;
            height: 2px;
            background-color: var(--text);
            transition: var(--transition);
        }

        /* Fullscreen Menu */
        #full-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: var(--bg);
            z-index: 900;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            clip-path: circle(0% at 95% 5%);
            transition: clip-path 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        #full-menu.active {
            clip-path: circle(150% at 95% 5%);
            pointer-events: all;
        }

        .menu-links {
            list-style: none;
            text-align: center;
        }

        .menu-links a {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            text-transform: uppercase;
            display: block;
            margin: 10px 0;
            transition: color 0.3s;
        }

        .menu-links a:hover {
            color: var(--accent);
        }

        /* Container & SPA Transition */
        main {
            min-height: 100vh;
            opacity: 1;
            transition: opacity 0.5s, transform 0.5s;
        }

        main.fade-out {
            opacity: 0;
            transform: translateY(10px);
        }

        /* Scroll Reveal */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .section-padding {
            padding: 160px 5% 100px;
        }

        /* Buttons & Containers - Sharp Edges */
        .btn {
            display: inline-block;
            padding: 18px 35px;
            background-color: transparent;
            border: 2px solid var(--text);
            color: var(--text);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.75rem;
            transition: var(--transition);
        }

        .btn:hover {
            background-color: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .btn-filled {
            background-color: var(--text);
            color: var(--bg);
        }

        .btn-accent {
            background-color: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .btn-accent:hover {
            background-color: var(--text);
            border-color: var(--text);
        }

        /* Grids */
        .grid-hero {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 40px;
            align-items: center;
        }

        .grid-styleguide {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .swatch {
            height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            border: 1px solid rgba(0,0,0,0.1);
        }

        /* Floating CTA */
        .floating-cta {
            position: fixed;
            bottom: 40px;
            left: 40px;
            z-index: 800;
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--accent);
            color: white;
            padding: 12px 22px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: var(--transition);
        }

        .floating-cta:hover {
            transform: scale(1.05);
            background: var(--text);
        }

        @media (max-width: 992px) {
            .grid-hero { grid-template-columns: 1fr; }
            .section-padding { padding-top: 120px; }
        }

    </style>
</head>

                                    <h3 style="margin-bottom: 15px; font-style: italic;">Konsultacja</h3>
                                    <p style="color: var(--sub-text);">Poznajemy Twoje potrzeby, styl życia i budżet. To fundament naszej przyszłej współpracy.</p>
                                </div>
                            </div>
                            <div class="reveal" style="display: flex; gap: 40px; margin-bottom: 60px;">
                                <div style="font-size: 3rem; font-weight: 900; color: var(--accent); opacity: 0.2; line-height: 1; font-family: 'Inter', sans-serif;">02</div>
                                <div>
                                    <h3 style="margin-bottom: 15px; font-style: italic;">Koncepcja</h3>
                                    <p style="color: var(--sub-text);">Tworzymy układ funkcjonalny oraz moodboardy definiujące estetykę wnętrza.</p>
                                </div>
                            </div>
                            <div class="reveal" style="display: flex; gap: 40px; margin-bottom: 60px;">
                                <div style="font-size: 3rem; font-weight: 900; color: var(--accent); opacity: 0.2; line-height: 1; font-family: 'Inter', sans-serif;">03</div>
                                <div>
                                    <h3 style="margin-bottom: 15px; font-style: italic;">Projekt i Realizacja</h3>
                                    <p style="color: var(--sub-text);">Przygotowujemy dokumentację techniczną i koordynujemy prace wykończeniowe.</p>
                                </div>
                            </div>
                        </div>
                    </section>
                `
            },
            '/o-nas': {
                title: 'O Nas | Veles Interiors',
                render: () => `
                    <section class="section-padding container">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center;">
                            <div class="reveal">
                                <h1 style="font-size: 4rem; margin-bottom: 30px;">Inżynieria<br>Luksusu.</h1>
                                <p style="font-size: 1.2rem; color: var(--sub-text); margin-bottom: 20px;">
                                    Veles Interiors powstało z pasji do surowego piękna i precyzyjnego inżynieryjnego podejścia do designu.
                                </p>
                                <p style="color: var(--sub-text);">
                                    Wierzymy, że luksus nie tkwi w przepychu, ale w jakości materiałów, proporcjach i autentyczności. Od 2014 roku przekształcamy przestrzenie w funkcjonalne dzieła sztuki.
                                </p>
                            </div>
                            <div class="reveal" style="background: var(--surface); height: 500px;">
                                <img src="https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&q=80&w=800" style="width:100%; height:100%; object-fit:cover; filter: grayscale(1);">
                            </div>
                        </div>
                    </section>
                `
            },
            '/kontakt': {
                title: 'Kontakt | Veles Interiors',
                render: () => `
                    <section class="section-padding" style="background: var(--trust); color: #FFF;">
                        <div class="container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 100px;">
                            <div>
                                <h1 style="font-size: 5rem; color: #FFF;">Kontakt.</h1>
                                <p style="margin-top: 40px; color: rgba(255,255,255,0.6);">Dostępni dla konsultacji na całym świecie.</p>
                            </div>
                            <div style="background: rgba(255,255,255,0.05); padding: 60px;">
                                <h3 style="margin-bottom: 30px;">Zapytanie Bezpośrednie</h3>
                                <div style="margin-bottom: 30px;">
                                    <label style="display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.5; margin-bottom: 10px;">Imię i Nazwisko</label>
                                    <input type="text" style="width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 0; font-size: 1rem; outline: none; font-family: inherit;">
                                </div>
                                <div style="margin-bottom: 30px;">
                                    <label style="display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.5; margin-bottom: 10px;">Adres Email</label>
                                    <input type="email" style="width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 0; font-size: 1rem; outline: none; font-family: inherit;">
                                </div>
                                <div style="margin-bottom: 40px;">
                                    <label style="display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.5; margin-bottom: 10px;">Wiadomość</label>
                                    <textarea rows="3" style="width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 0; font-size: 1rem; outline: none; font-family: inherit; resize: none;"></textarea>
                                </div>
                                <button class="btn btn-accent" style="width: 100%;">Wyślij Zapytanie</button>
                            </div>
                        </div>
                    </section>
                `
            }
        };

        const handleRoute = () => {
            const path = window.location.hash.slice(1) || '/';
            const route = routes[path] || routes['/'];
            const main = document.getElementById('main-content');

            main.classList.add('fade-out');
            setTimeout(() => {
                main.innerHTML = route.render();
                document.title = route.title;
                window.scrollTo(0, 0);
                main.classList.remove('fade-out');
                closeMenu();
                initCursor();
                initScrollReveal();
                initCounters();
                initCountdown();
            }, 300);
        };

        const initTheme = () => {
            const toggle = document.getElementById('theme-toggle');
            const icon = document.getElementById('theme-icon');

            const setDarkMode = (isDark) => {
                if (isDark) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    icon.textContent = 'TRYB JASNY';
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.removeAttribute('data-theme');
                    icon.textContent = 'TRYB CIEMNY';
                    localStorage.setItem('theme', 'light');
                }
            };

            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') setDarkMode(true);
            toggle.addEventListener('click', () => setDarkMode(!document.documentElement.hasAttribute('data-theme')));
        };

        const initMenu = () => {
            const hamburger = document.getElementById('hamburger');
            const menu = document.getElementById('full-menu');
            hamburger.addEventListener('click', () => {
                hamburger.classList.toggle('active');
                menu.classList.toggle('active');
                document.body.style.overflow = menu.classList.contains('active') ? 'hidden' : 'auto';
            });
        };

        const closeMenu = () => {
            document.getElementById('hamburger').classList.remove('active');
            document.getElementById('full-menu').classList.remove('active');
            document.body.style.overflow = 'auto';
        };

        const initCursor = () => {
            const cursor = document.getElementById('cursor');
            document.onmousemove = (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            };
            document.querySelectorAll('a, button, .btn').forEach(el => {
                el.onmouseenter = () => cursor.classList.add('hover');
                el.onmouseleave = () => cursor.classList.remove('hover');
            });
        };

        const initScrollReveal = () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        };

        const initCounters = () => {
            const counters = document.querySelectorAll('.stat-counter');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const target = parseInt(entry.target.getAttribute('data-target'));
                        let count = 0;
                        const duration = 2000;
                        const increment = target / (duration / 16);
                        const update = () => {
                            count += increment;
                            if (count < target) {
                                entry.target.innerText = Math.ceil(count);
                                requestAnimationFrame(update);
                            } else {
                                entry.target.innerText = target;
                            }
                        };
                        update();
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.5 });
            counters.forEach(c => observer.observe(c));
        };

        const initCountdown = () => {
            const timer = document.getElementById('countdown-timer');
            if (!timer) return;
            let time = 15 * 60; // 15 minutes
            setInterval(() => {
                if (time <= 0) return;
                time--;
                const mins = Math.floor(time / 60);
                const secs = time % 60;
                timer.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
        };

        const initToasts = () => {
            const toasts = [
                "Anna z Warszawy właśnie zarezerwowała darmową wycenę.",
                "Marek z Łodzi rozpoczął projekt apartamentu.",
                "Ktoś właśnie pobrał nasz katalog 2024.",
                "Zostały tylko 2 wolne terminy na kwiecień!"
            ];
            const container = document.getElementById('toast-container');

            const showToast = () => {
                const toast = document.createElement('div');
                toast.style.cssText = "background: white; color: black; padding: 15px 25px; border-left: 4px solid var(--accent); margin-bottom: 10px; font-size: 0.8rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); opacity: 0; transform: translateX(-20px); transition: 0.5s;";
                toast.innerText = toasts[Math.floor(Math.random() * toasts.length)];
                container.appendChild(toast);

                setTimeout(() => { toast.style.opacity = "1"; toast.style.transform = "translateX(0)"; }, 100);
                setTimeout(() => { toast.style.opacity = "0"; toast.style.transform = "translateX(-20px)"; }, 5000);
                setTimeout(() => { toast.remove(); }, 5500);
            };

            setInterval(showToast, 8000);
            setTimeout(showToast, 3000);
        };

        const initLeadModal = () => {
            const modal = document.getElementById('lead-modal');
            const close = document.getElementById('close-modal');

            setTimeout(() => {
                if (!localStorage.getItem('modal-shown')) {
                    modal.style.display = 'flex';
                    localStorage.setItem('modal-shown', 'true');
                }
            }, 15000);

            close.onclick = () => modal.style.display = 'none';
        };

        const initFooter = () => {
            document.getElementById('footer').innerHTML = `
                <div style="background: var(--trust); color: #FFF; padding: 100px 5% 40px;">
                    <div class="container" style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div>
                            <div class="logo-wrapper" style="margin-bottom: 20px;">
                                <img src="veles-construction-logo-alone-bgless.png" alt="Veles Logo" class="logo-icon" style="filter: brightness(0) invert(1);">
                                <span class="logo-text" style="color: #FFF;"><b>VELES</b> INTERIORS</span>
                            </div>
                            <p style="opacity: 0.5; max-width: 250px; font-size: 0.8rem;">Projektowanie luksusowych wnętrz z industrialną precyzją.</p>
                        </div>
                        <div style="display: flex; gap: 80px;">
                            <div>
                                <h4 style="margin-bottom: 20px; font-size: 0.7rem; letter-spacing: 0.1em; opacity: 0.3;">MENU</h4>
                                <ul style="list-style: none; font-size: 0.8rem; line-height: 2;">
                                    <li><a href="#/realizacje">Realizacje</a></li>
                                    <li><a href="#/oferta">Oferta</a></li>
                                    <li><a href="#/proces">Proces</a></li>
                                    <li><a href="#/o-nas">O Nas</a></li>
                                    <li><a href="#/kontakt">Kontakt</a></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                    <div class="container" style="margin-top: 100px; padding-top: 40px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 0.7rem; opacity: 0.3;">
                        © ${new Date().getFullYear()} VELES INTERIORS. WIĘCEJ NIŻ MINIMALIZM.
                    </div>
                </div>
            `;
        };

        window.addEventListener('hashchange', handleRoute);
        window.addEventListener('load', () => {
            initTheme();
            handleRoute();
            initMenu();
            initCursor();
            initFooter();
            initToasts();
            initLeadModal();
        });
    </script>
</body>
</html>
