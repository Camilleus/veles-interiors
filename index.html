    <style>
        :root {
            /* Palette Setup - Light Mode (Default) */
            --bg: #FFFFFF;
            --text: #121212;
            --accent: #FE1110;
            --sub-text: #666666;
            --surface: #F9F9F9;
            --transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            --header-height: 100px;
        }

        [data-theme="dark"] {
            --bg: #121212;
            --text: #F5F5F5;
            --accent: #FE1110;
            --sub-text: #AAAAAA;
            --surface: #1E1E1E;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* Custom cursor */
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: background-color var(--transition), color var(--transition);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Grain Effect */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.04;
            z-index: 9998;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        h1, h2, h3, h4, .heading {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            line-height: 1.1;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
        }

        /* Custom Cursor */
        #cursor {
            position: fixed;
            width: 12px;
            height: 12px;
            background-color: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, background-color 0.3s;
        }

        #cursor.hover {
            width: 60px;
            height: 60px;
            background-color: rgba(254, 17, 16, 0.15);
            border: 1px solid var(--accent);
        }

        /* Navigation */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: var(--header-height);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            z-index: 1000;
            background: transparent;
        }

        .logo img {
            height: 32px;
            transition: opacity 0.4s ease;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.2rem;
            cursor: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hamburger {
            width: 30px;
            height: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: none;
            border: none;
            cursor: none;
        }

        .hamburger span {
            width: 100%;
            height: 2px;
            background-color: var(--text);
            transition: var(--transition);
        }

        .hamburger.active span:nth-child(1) { transform: translateY(9px) rotate(45deg); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }

        /* Fullscreen Menu */
        #full-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: var(--bg);
            z-index: 900;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            clip-path: circle(0% at 95% 5%);
            transition: clip-path 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        #full-menu.active {
            clip-path: circle(150% at 95% 5%);
            pointer-events: all;
        }

        .menu-links {
            list-style: none;
            text-align: center;
        }

        .menu-links li {
            margin: 20px 0;
            overflow: hidden;
        }

        .menu-links a {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 700;
            display: block;
            transform: translateY(100%);
            transition: transform 0.5s;
        }

        #full-menu.active .menu-links a {
            transform: translateY(0);
        }

        .menu-links a:hover {
            color: var(--accent);
            padding-left: 20px;
        }

        /* Container & SPA Transition */
        main {
            min-height: 100vh;
            opacity: 1;
            transition: opacity 0.5s, transform 0.5s;
        }

        main.fade-out {
            opacity: 0;
            transform: translateY(20px);
        }

        /* Scroll Reveal */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .section-padding {
            padding: 160px 5% 100px;
        }

        @media (max-width: 768px) {
            .section-padding {
                padding: 120px 5% 60px;
            }
        }

        /* Layout Grids */
        .grid-hero {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 60px;
            width: 100%;
            align-items: center;
        }

        .grid-values {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .grid-process {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .grid-about {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: start;
        }

        .grid-contact {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 100px;
            width: 100%;
        }

        .grid-footer {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 80px;
        }

        @media (max-width: 992px) {
            .grid-hero, .grid-process, .grid-about, .grid-contact, .grid-footer {
                grid-template-columns: 1fr;
                gap: 40px;
            }
            .grid-process div:nth-child(1) { order: 1; }
            .grid-process div:nth-child(2) { order: 2; }
            .grid-process[style*="text-align: right"] { text-align: left !important; }
            .grid-process[style*="text-align: right"] div { margin-left: 0 !important; }
        }

        /* Floating CTA */
        .floating-cta {
            position: fixed;
            bottom: 40px;
            left: 40px;
            z-index: 800;
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--accent);
            color: white;
            padding: 15px 25px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            box-shadow: 0 10px 30px rgba(254, 17, 16, 0.3);
            transition: var(--transition);
            transform: translateY(0);
        }

        .floating-cta:hover {
            transform: translateY(-5px);
            background: var(--text);
            color: var(--bg);
        }

        @media (max-width: 768px) {
            .floating-cta {
                bottom: 20px;
                left: 20px;
                padding: 12px 20px;
            }
        }

        /* Utility */
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .btn {
            display: inline-block;
            padding: 20px 40px;
            background-color: var(--accent);
            color: white;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.8rem;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }

        .btn:hover {
            background-color: var(--text);
            color: var(--bg);
        }

        /* Specific Page Styles will be added here */

    </style>
</head>

                                    </div>
                                    <div>
                                        <label style="display: block; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; color: #666;">Metraż (m²)</label>
                                        <input type="number" style="width: 100%; background: transparent; border: none; border-bottom: 1px solid #333; padding: 10px 0; color: white; outline: none;">
                                    </div>
                                </div>
                                <div style="margin-bottom: 40px;">
                                    <label style="display: block; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; color: #666;">Wiadomość</label>
                                    <textarea rows="4" style="width: 100%; background: transparent; border: none; border-bottom: 1px solid #333; padding: 10px 0; color: white; outline: none; resize: none;"></textarea>
                                </div>
                                <button type="submit" class="btn" style="width: 100%;">Wyślij zapytanie</button>
                            </form>
                        </div>
                    </section>
                `
            }
        };

        // --- CORE FUNCTIONS ---
        const handleRoute = () => {
            const path = window.location.hash.slice(1) || '/';
            const route = routes[path] || routes['/'];
            const main = document.getElementById('main-content');

            // Fade out
            main.classList.add('fade-out');

            setTimeout(() => {
                main.innerHTML = route.render();
                document.title = route.title;
                window.scrollTo(0, 0);

                // Fade in
                main.classList.remove('fade-out');
                closeMenu();
                initCursor(); // Re-init hover effects
                initScrollReveal(); // Re-init scroll observer
            }, 500);
        };

        // Theme Logic
        const initTheme = () => {
            const toggle = document.getElementById('theme-toggle');
            const icon = document.getElementById('theme-icon');
            const logo = document.getElementById('logo-img');

            const setDarkMode = (isDark) => {
                const footerLogo = document.getElementById('footer-logo');
                if (isDark) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    icon.textContent = '☀️';
                    logo.src = 'veles-interiors-full-reversed.png';
                    if (footerLogo) footerLogo.src = 'veles-interiors-full-reversed.png';
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.removeAttribute('data-theme');
                    icon.textContent = '🌙';
                    logo.src = 'veles-interiors-full.png';
                    if (footerLogo) footerLogo.src = 'veles-interiors-full.png';
                    localStorage.setItem('theme', 'light');
                }
            };

            // Check initial theme
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') setDarkMode(true);

            toggle.addEventListener('click', () => {
                const isDark = document.documentElement.hasAttribute('data-theme');
                setDarkMode(!isDark);
            });
        };

        // Hamburger Menu
        const initMenu = () => {
            const hamburger = document.getElementById('hamburger');
            const menu = document.getElementById('full-menu');

            hamburger.addEventListener('click', () => {
                hamburger.classList.toggle('active');
                menu.classList.toggle('active');
                document.body.style.overflow = menu.classList.contains('active') ? 'hidden' : 'auto';
            });
        };

        const closeMenu = () => {
            document.getElementById('hamburger').classList.remove('active');
            document.getElementById('full-menu').classList.remove('active');
            document.body.style.overflow = 'auto';
        };

        // Custom Cursor
        const initCursor = () => {
            const cursor = document.getElementById('cursor');
            document.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });

            const interactables = document.querySelectorAll('a, button, input, textarea, .btn');
            interactables.forEach(el => {
                el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
                el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
            });
        };

        // Footer
        const initFooter = () => {
            const footer = document.getElementById('footer');
            footer.innerHTML = `
                <div style="padding: 100px 5% 40px; border-top: 1px solid var(--surface);">
                    <div class="container grid-footer">
                        <div>
                            <img src="${document.documentElement.hasAttribute('data-theme') ? 'veles-interiors-full-reversed.png' : 'veles-interiors-full.png'}" alt="Logo" style="height: 30px; margin-bottom: 30px;" id="footer-logo">
                            <p style="color: var(--sub-text); max-width: 300px;">
                                Eksperci w dziedzinie wykonawstwa wnętrz luksusowych. Inżynieria, która buduje wartość.
                            </p>
                        </div>
                        <div>
                            <h4 style="margin-bottom: 25px; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.1em;">Nawigacja</h4>
                            <ul style="list-style: none; display: flex; flex-direction: column; gap: 10px;">
                                <li><a href="#/o-nas" style="color: var(--sub-text);">O nas</a></li>
                                <li><a href="#/kariera" style="color: var(--sub-text);">Kariera</a></li>
                                <li><a href="#/kontakt" style="color: var(--sub-text);">Kontakt</a></li>
                                <li><a href="#" style="color: var(--sub-text);">Polityka prywatności</a></li>
                            </ul>
                        </div>
                        <div>
                            <h4 style="margin-bottom: 25px; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.1em;">Social</h4>
                            <ul style="list-style: none; display: flex; flex-direction: column; gap: 10px;">
                                <li><a href="#" style="color: var(--sub-text);">Instagram</a></li>
                                <li><a href="#" style="color: var(--sub-text);">LinkedIn</a></li>
                            </ul>
                        </div>
                    </div>
                    <div class="container" style="margin-top: 80px; padding-top: 40px; border-top: 1px solid var(--surface); display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--sub-text);">
                        <p>&copy; <span id="year"></span> Veles Interiors. Wszystkie prawa zastrzeżone.</p>
                        <p>Realizacja: Excellence</p>
                    </div>
                </div>
            `;
            document.getElementById('year').textContent = new Date().getFullYear();
        };

        // Scroll Reveal Observer
        const initScrollReveal = () => {
            const observerOptions = {
                threshold: 0.1,
                rootMargin: "0px 0px -50px 0px"
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        };

        // --- INIT ---
        window.addEventListener('hashchange', handleRoute);
        window.addEventListener('load', () => {
            initTheme();
            handleRoute();
            initMenu();
            initCursor();
            initFooter();
        });

    </script>
</body>
</html>
